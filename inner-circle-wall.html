<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inner Circle Wall — Controller</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --accent: #E8B84B; --accent-dim: rgba(232,184,75,0.18); --accent-border: rgba(232,184,75,0.45);
  --bg: #0f0e0a; --panel: #1a1810; --text: #F2F2F2; --text-dim: rgba(242,242,242,0.5);
  --border: rgba(255,255,255,0.08); --green: #39ff14; --red: #ff2d55;
}
body { background:var(--bg); font-family:'DM Sans',sans-serif; color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
.card { background:var(--panel); border:1px solid var(--border); border-radius:18px; padding:36px 40px; width:520px; }
h1 { font-size:20px; font-weight:700; color:var(--accent); margin-bottom:4px; }
.sub { font-size:13px; color:var(--text-dim); margin-bottom:28px; }
.field-label { font-size:11px; font-weight:600; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.7px; display:block; margin-bottom:7px; }
.tab-row { display:flex; gap:3px; background:rgba(255,255,255,0.04); border-radius:8px; padding:3px; margin-bottom:20px; }
.tab-btn { flex:1; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; color:var(--text-dim); background:transparent; border:none; border-radius:6px; padding:9px; cursor:pointer; transition:all 0.15s; }
.tab-btn.active { background:rgba(255,255,255,0.08); color:var(--text); }
.tab-pane { display:none; } .tab-pane.active { display:block; }
.drop-zone { border:1.5px dashed rgba(255,255,255,0.15); border-radius:10px; padding:28px 20px; text-align:center; cursor:pointer; transition:all 0.2s; margin-bottom:14px; background:rgba(255,255,255,0.02); }
.drop-zone:hover,.drop-zone.drag-over { border-color:var(--accent); background:var(--accent-dim); }
.drop-zone-icon { font-size:26px; margin-bottom:8px; }
.drop-zone p { font-size:13px; color:var(--text-dim); line-height:1.5; }
.drop-zone p strong { color:var(--text); }
#csv-input { display:none; }
textarea { width:100%; height:110px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:8px; padding:12px 14px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:13px; resize:none; outline:none; line-height:1.6; margin-bottom:14px; }
textarea::placeholder { color:var(--text-dim); }
#name-preview { font-size:12px; color:var(--accent); margin-bottom:20px; min-height:18px; }
.status-row { display:flex; align-items:center; gap:10px; margin-bottom:20px; padding:10px 14px; background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:8px; font-size:13px; }
.status-dot { width:9px; height:9px; border-radius:50%; background:var(--text-dim); flex-shrink:0; transition:background .3s; }
.status-dot.live { background:var(--green); box-shadow:0 0 8px var(--green); }
.status-dot.hidden { background:var(--red); }
#status-text { color:var(--text-dim); flex:1; }
.btn-row { display:flex; gap:8px; }
.go-btn { flex:1; padding:13px; background:var(--accent); border:none; border-radius:9px; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:700; color:#1a1200; cursor:pointer; transition:opacity 0.15s; }
.go-btn:hover { opacity:0.88; } .go-btn:disabled { opacity:0.35; cursor:not-allowed; }
.ctrl-btn { padding:13px 18px; background:transparent; border:1px solid var(--border); border-radius:9px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; color:var(--text-dim); cursor:pointer; transition:all 0.15s; }
.ctrl-btn:hover { border-color:var(--accent); color:var(--accent); }
.ctrl-btn:disabled { opacity:0.35; cursor:not-allowed; }
.hint { font-size:11.5px; color:var(--text-dim); text-align:center; margin-top:14px; line-height:1.6; }
.sync-note { font-size:11px; color:var(--accent); margin-top:10px; min-height:16px; text-align:center; }
</style>
</head>
<body>
<div class="card">
  <h1>⭐ Inner Circle Wall</h1>
  <p class="sub">Load members, then control the OBS overlay from here.</p>

  <div class="status-row">
    <div class="status-dot" id="statusDot"></div>
    <span id="status-text">Not started</span>
    <span id="batch-info" style="font-size:12px;color:var(--text-dim);margin-left:auto;"></span>
  </div>

  <div class="tab-row">
    <button class="tab-btn active" onclick="switchTab('csv')">Upload CSV</button>
    <button class="tab-btn" onclick="switchTab('manual')">Enter manually</button>
  </div>

  <div class="tab-pane active" id="tab-csv">
    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('csv-input').click()">
      <div class="drop-zone-icon">📄</div>
      <p><strong>Click to upload</strong> or drag &amp; drop your CSV<br>YouTube Studio export or any CSV with names</p>
    </div>
    <input type="file" id="csv-input" accept=".csv,.txt">
  </div>

  <div class="tab-pane" id="tab-manual">
    <span class="field-label">One name per line</span>
    <textarea id="manual-names" placeholder="Jon Cohen&#10;Ammon Ra&#10;Flibberty Giblets"></textarea>
  </div>

  <div id="name-preview"></div>

  <div class="btn-row">
    <button class="go-btn" id="go-btn" onclick="goLive()" disabled>Go Live</button>
    <button class="ctrl-btn" id="toggle-btn" onclick="toggleVisibility()" disabled>Show / Hide</button>
    <button class="ctrl-btn" id="next-btn" onclick="nextBatch()" disabled>Next →</button>
  </div>

  <p class="hint">Load names → <strong>Go Live</strong> to push to OBS → <strong>Show/Hide</strong> to toggle.<br>Keyboard: <strong>S</strong> = show/hide &nbsp;·&nbsp; <strong>N</strong> = next batch</p>
  <div class="sync-note" id="syncNote"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCvclsCp83qcaTVTYe1GTT0ZIhIbMCut14",
  authDomain: "believer-bingo.firebaseapp.com",
  projectId: "believer-bingo",
  storageBucket: "believer-bingo.firebasestorage.app",
  messagingSenderId: "1054324566020",
  appId: "1:1054324566020:web:dc6739c69458011efe2d51"
};

const app        = initializeApp(firebaseConfig);
const db         = getFirestore(app);
const wallRef    = doc(db, "innerCircleWall", "state");
const membersRef = doc(db, "config", "innerCircle");

const BATCH_SIZE = 16;
let allNames = [], currentBatch = 0, totalBatches = 0, isVisible = false, isLive = false;

// Reflect live Firestore state
onSnapshot(wallRef, snap => {
  if (!snap.exists()) return;
  const data = snap.data();
  isVisible    = data.visible || false;
  currentBatch = data.batch   || 0;
  updateStatusUI();
});

window.switchTab = function(tab) {
  document.querySelectorAll(".tab-btn").forEach((b, i) => {
    b.classList.toggle("active", (i===0&&tab==="csv")||(i===1&&tab==="manual"));
  });
  document.getElementById("tab-csv").classList.toggle("active", tab==="csv");
  document.getElementById("tab-manual").classList.toggle("active", tab==="manual");
  updatePreview();
};

const dropZone = document.getElementById("drop-zone");
const csvInput = document.getElementById("csv-input");
dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("drag-over"); });
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
dropZone.addEventListener("drop", e => { e.preventDefault(); dropZone.classList.remove("drag-over"); if (e.dataTransfer.files[0]) readCSV(e.dataTransfer.files[0]); });
csvInput.addEventListener("change", () => { if (csvInput.files[0]) readCSV(csvInput.files[0]); });

function readCSV(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const names = parseCSV(e.target.result);
    allNames = names;
    dropZone.querySelector("p").innerHTML = `<strong>${file.name}</strong><br><span style="color:var(--accent)">${names.length} members loaded</span>`;
    updatePreview();
  };
  reader.readAsText(file);
}

function parseCSV(text) {
  const lines = text.split("\n").map(l=>l.trim()).filter(Boolean);
  const header = lines[0].toLowerCase();
  const isYT = header.includes("member")||header.includes("name")||header.includes("level");
  const names = [];
  for (let i = isYT?1:0; i<lines.length; i++) {
    const cols = lines[i].split(",").map(c=>c.replace(/^"|"$/g,"").trim());
    if (cols[0]&&cols[0].length<60) names.push(cols[0]);
  }
  return names;
}

document.getElementById("manual-names").addEventListener("input", () => {
  allNames = document.getElementById("manual-names").value.split("\n").map(l=>l.trim()).filter(Boolean);
  updatePreview();
});

function updatePreview() {
  totalBatches = Math.ceil(allNames.length / BATCH_SIZE);
  const preview = document.getElementById("name-preview");
  const goBtn   = document.getElementById("go-btn");
  if (allNames.length) {
    preview.textContent = `${allNames.length} member${allNames.length!==1?"s":""} loaded · ${totalBatches} batch${totalBatches!==1?"es":""} of ${BATCH_SIZE}`;
    goBtn.disabled = false;
  } else {
    preview.textContent = ""; goBtn.disabled = true;
  }
}

window.goLive = async function() {
  if (!allNames.length) return;
  totalBatches = Math.ceil(allNames.length / BATCH_SIZE);
  currentBatch = 0; isLive = true;
  await setDoc(wallRef, { names: allNames, visible: false, batch: 0 });
  await setDoc(membersRef, { members: allNames }, { merge: true });
  document.getElementById("toggle-btn").disabled = false;
  document.getElementById("next-btn").disabled = totalBatches <= 1;
  setSyncNote(`✓ Pushed to OBS · ${allNames.length} members · ${totalBatches} batch${totalBatches!==1?"es":""}`);
};

window.toggleVisibility = async function() {
  isVisible = !isVisible;
  await setDoc(wallRef, { visible: isVisible }, { merge: true });
};

window.nextBatch = async function() {
  currentBatch = (currentBatch + 1) % totalBatches;
  await setDoc(wallRef, { batch: currentBatch }, { merge: true });
};

function updateStatusUI() {
  const dot  = document.getElementById("statusDot");
  const text = document.getElementById("status-text");
  const info = document.getElementById("batch-info");
  if (!isLive) { dot.className="status-dot"; text.textContent="Not started"; info.textContent=""; return; }
  dot.className = isVisible ? "status-dot live" : "status-dot hidden";
  text.textContent = isVisible ? "Overlay VISIBLE in OBS" : "Overlay hidden";
  info.textContent = totalBatches>1 ? `Batch ${currentBatch+1} / ${totalBatches}` : "";
}

function setSyncNote(msg) {
  const el = document.getElementById("syncNote");
  el.textContent = msg;
  setTimeout(() => { el.textContent = ""; }, 4000);
}

document.addEventListener("keydown", e => {
  if (!isLive) return;
  if (e.key==="s"||e.key==="S") { e.preventDefault(); window.toggleVisibility(); }
  if (e.key==="n"||e.key==="N") { e.preventDefault(); window.nextBatch(); }
});
</script>
</body>
</html>
