<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:transparent;overflow:hidden;width:1920px;height:1080px;font-family:system-ui,-apple-system,sans-serif;}

/* Small persistent counter — bottom right, appears when votes > 0 */
#vote-counter{
  position:fixed;bottom:80px;right:80px;
  background:rgba(8,8,15,.85);
  border:2px solid rgba(232,184,75,.5);
  border-radius:20px;padding:18px 36px;
  display:flex;align-items:center;gap:16px;
  opacity:0;transition:opacity .5s;
  backdrop-filter:blur(6px);
}
#vote-counter.visible{opacity:1;}
#vote-pip{width:18px;height:18px;border-radius:50%;background:#e8b84b;box-shadow:0 0 14px #e8b84b;}
#vote-label{font-size:36px;font-weight:700;letter-spacing:2px;color:#e8b84b;}

/* Full verdict blast */
#verdict-blast{
  position:fixed;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;opacity:0;
}
#verdict-blast.active{animation:blastIn .6s cubic-bezier(.16,1,.3,1) forwards;}
#verdict-blast.out{animation:blastOut .5s ease forwards;}
@keyframes blastIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
@keyframes blastOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(1.05)}}

.blast-bg{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at center,rgba(255,45,85,.2) 0%,transparent 65%);
}
.blast-icon{font-size:100px;margin-bottom:20px;animation:shake .5s ease .1s both;}
@keyframes shake{0%,100%{transform:rotate(0)}20%{transform:rotate(-10deg)}60%{transform:rotate(10deg)}80%{transform:rotate(-5deg)}}

.blast-title{
  font-size:80px;font-weight:900;letter-spacing:8px;
  color:#ff2d55;
  text-shadow:0 0 50px rgba(255,45,85,.9),0 0 100px rgba(255,45,85,.5);
  margin-bottom:10px;
}
.blast-subtitle{
  font-size:24px;color:rgba(240,240,255,.65);
  letter-spacing:4px;text-transform:uppercase;margin-bottom:32px;
}
.blast-voters{
  display:flex;gap:14px;flex-wrap:wrap;justify-content:center;max-width:1000px;
}
.voter-chip{
  background:rgba(255,45,85,.15);
  border:1px solid rgba(255,45,85,.55);
  border-radius:40px;padding:10px 24px;
  font-size:18px;font-weight:700;color:#ff8aaa;
  letter-spacing:1px;
  animation:chipIn .4s ease both;
}
@keyframes chipIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div id="vote-counter">
  <div id="vote-pip"></div>
  <div id="vote-label">☠️ <span id="vc-count">0</span> / <span id="vc-thresh">2</span></div>
</div>

<div id="verdict-blast">
  <div class="blast-bg"></div>
  <div class="blast-icon">☠️</div>
  <div class="blast-title">KILL SWITCH</div>
  <div class="blast-subtitle">Kill Switch Activated</div>
  <div class="blast-voters" id="blast-voters"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCvclsCp83qcaTVTYe1GTT0ZIhIbMCut14",
  authDomain: "believer-bingo.firebaseapp.com",
  projectId: "believer-bingo",
  storageBucket: "believer-bingo.firebasestorage.app",
  messagingSenderId: "1054324566020",
  appId: "1:1054324566020:web:dc6739c69458011efe2d51"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

let lastFired = false;
let blastTimer = null;

onSnapshot(doc(db, "vote", "current"), snap => {
  if (!snap.exists()) return;
  const data = snap.data();
  const count  = Object.values(data.votes || {}).filter(Boolean).length;
  const thresh = data.threshold || 2;
  const fired  = data.fired || false;

  // Counter badge
  const counter = document.getElementById("vote-counter");
  document.getElementById("vc-count").textContent = count;
  document.getElementById("vc-thresh").textContent = thresh;
  if (count > 0 && !fired) counter.classList.add("visible");
  else counter.classList.remove("visible");

  // Verdict blast — only trigger once per firing
  if (fired && !lastFired) triggerBlast(data.voters || []);
  if (!fired && lastFired) dismissBlast();
  lastFired = fired;
});

function triggerBlast(voters) {
  const blast = document.getElementById("verdict-blast");
  const votersEl = document.getElementById("blast-voters");
  votersEl.innerHTML = voters.map((v, i) =>
    `<div class="voter-chip" style="animation-delay:${0.3 + i * 0.1}s">⚡ ${esc(v)}</div>`
  ).join("");
  blast.className = "active";
  // Play sound
  const snd = new Audio("https://joncohenmusic.github.io/bingo/verdict.mp3");
  snd.play().catch(() => {});
  if (blastTimer) clearTimeout(blastTimer);
  blastTimer = setTimeout(dismissBlast, 9000);
}

function dismissBlast() {
  const blast = document.getElementById("verdict-blast");
  blast.className = "out";
  setTimeout(() => { blast.className = ""; }, 600);
}

function esc(str) {
  const d = document.createElement("div");
  d.textContent = str;
  return d.innerHTML;
}
</script>
</body>
</html>
