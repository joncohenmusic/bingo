<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:transparent;overflow:hidden;width:1920px;height:1080px;font-family:system-ui,-apple-system,sans-serif;}

/* Persistent counter — bottom right, appears when any vote activity */
#vote-counter{
  position:fixed;bottom:80px;right:80px;
  background:rgba(8,8,15,.85);
  border:2px solid rgba(232,184,75,.5);
  border-radius:20px;padding:18px 32px;
  display:flex;align-items:center;gap:24px;
  opacity:0;transition:opacity .5s;
  backdrop-filter:blur(6px);
}
#vote-counter.visible{opacity:1;}
.vc-seg{display:flex;align-items:center;gap:10px;font-size:36px;font-weight:700;letter-spacing:2px;}
.vc-seg.kill{color:#ff2d55;text-shadow:0 0 18px rgba(255,45,85,.5);}
.vc-seg.keep{color:#3dd68c;text-shadow:0 0 18px rgba(61,214,140,.5);}
.vc-seg.net {color:#e8b84b;text-shadow:0 0 18px rgba(232,184,75,.5);}
.vc-divider{width:1px;height:34px;background:rgba(232,184,75,.35);}
.vc-net-label{font-size:18px;color:#8888aa;letter-spacing:3px;margin-right:6px;font-weight:600;}

/* Full verdict blast */
#verdict-blast{
  position:fixed;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;opacity:0;
}
#verdict-blast.active{animation:blastIn .6s cubic-bezier(.16,1,.3,1) forwards;}
#verdict-blast.out{animation:blastOut .5s ease forwards;}
@keyframes blastIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
@keyframes blastOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(1.05)}}

.blast-bg{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at center,rgba(255,45,85,.2) 0%,transparent 65%);
}
.blast-icon{font-size:100px;margin-bottom:20px;animation:shake .5s ease .1s both;}
@keyframes shake{0%,100%{transform:rotate(0)}20%{transform:rotate(-10deg)}60%{transform:rotate(10deg)}80%{transform:rotate(-5deg)}}

.blast-title{
  font-size:80px;font-weight:900;letter-spacing:8px;
  color:#ff2d55;
  text-shadow:0 0 50px rgba(255,45,85,.9),0 0 100px rgba(255,45,85,.5);
  margin-bottom:10px;
}
.blast-subtitle{
  font-size:40px;color:rgba(240,240,255,.65);
  letter-spacing:6px;text-transform:uppercase;margin-bottom:48px;
}
.blast-voters{
  display:flex;gap:20px;flex-wrap:wrap;justify-content:center;max-width:1400px;
}
.voter-chip{
  background:rgba(255,45,85,.15);
  border:1px solid rgba(255,45,85,.55);
  border-radius:50px;padding:18px 44px;
  font-size:40px;font-weight:700;color:#ff8aaa;
  letter-spacing:2px;
  animation:chipIn .4s ease both;
}
@keyframes chipIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

#blast-defenders{
  display:none;flex-direction:column;align-items:center;gap:16px;margin-top:42px;
}
#blast-defenders.show{display:flex;}
.defender-label{
  font-size:22px;color:rgba(240,240,255,.45);
  letter-spacing:5px;text-transform:uppercase;
}
.defender-row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;max-width:1400px;}
.defender-chip{
  background:rgba(61,214,140,.1);
  border:1px solid rgba(61,214,140,.45);
  border-radius:40px;padding:10px 28px;
  font-size:24px;font-weight:600;color:#7feab0;
  letter-spacing:1.5px;
  animation:chipIn .4s ease both;
}
</style>
</head>
<body>

<div id="vote-counter">
  <div class="vc-seg kill">☠️ <span id="vc-kill">0</span></div>
  <div class="vc-seg keep">🛡 <span id="vc-keep">0</span></div>
  <div class="vc-divider"></div>
  <div class="vc-seg net">
    <span class="vc-net-label">NET</span><span id="vc-net">0</span>/<span id="vc-thresh">2</span>
  </div>
</div>

<div id="verdict-blast">
  <div class="blast-bg"></div>
  <div class="blast-icon">☠️</div>
  <div class="blast-title">KILL SWITCH</div>
  <div class="blast-subtitle">Kill Switch Activated</div>
  <div class="blast-voters" id="blast-voters"></div>
  <div id="blast-defenders">
    <div class="defender-label">Shielded in vain by</div>
    <div class="defender-row" id="defender-row"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, updateDoc }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCvclsCp83qcaTVTYe1GTT0ZIhIbMCut14",
  authDomain: "believer-bingo.firebaseapp.com",
  projectId: "believer-bingo",
  storageBucket: "believer-bingo.firebasestorage.app",
  messagingSenderId: "1054324566020",
  appId: "1:1054324566020:web:dc6739c69458011efe2d51"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const voteDoc = doc(db, "vote", "current");

let lastFired = false;
let blastTimer = null;
let blasting   = false;

function normVote(v) {
  if (v === true || v === "kill") return "kill";
  if (v === "keep") return "keep";
  return null;
}

onSnapshot(voteDoc, snap => {
  if (!snap.exists()) return;
  const data = snap.data();
  const votes = data.votes || {};

  let killCount = 0, keepCount = 0;
  for (const v of Object.values(votes)) {
    const nv = normVote(v);
    if (nv === "kill") killCount++;
    else if (nv === "keep") keepCount++;
  }
  const net    = killCount - keepCount;
  const thresh = data.threshold || 2;
  const fired  = data.fired || false;

  // Counter badge
  document.getElementById("vc-kill").textContent   = killCount;
  document.getElementById("vc-keep").textContent   = keepCount;
  document.getElementById("vc-net").textContent    = net;
  document.getElementById("vc-thresh").textContent = thresh;

  const counter = document.getElementById("vote-counter");
  const anyActivity = (killCount + keepCount) > 0;
  if (anyActivity && !fired && !blasting) counter.classList.add("visible");
  else counter.classList.remove("visible");

  // Verdict blast — only trigger once per firing
  if (fired && !lastFired) triggerBlast(data.voters || [], data.defenders || []);
  if (!fired && lastFired && !blasting) dismissBlast();
  lastFired = fired;
});

function triggerBlast(voters, defenders) {
  blasting = true;
  const blast    = document.getElementById("verdict-blast");
  const votersEl = document.getElementById("blast-voters");
  votersEl.innerHTML = voters.map((v, i) =>
    `<div class="voter-chip" style="animation-delay:${0.3 + i * 0.1}s">⚡ ${esc(v)}</div>`
  ).join("");

  const defendersWrap = document.getElementById("blast-defenders");
  const defendersRow  = document.getElementById("defender-row");
  if (defenders.length) {
    defendersRow.innerHTML = defenders.map((v, i) =>
      `<div class="defender-chip" style="animation-delay:${0.6 + i * 0.1}s">🛡 ${esc(v)}</div>`
    ).join("");
    defendersWrap.classList.add("show");
  } else {
    defendersWrap.classList.remove("show");
  }

  blast.className = "active";
  const snd = new Audio("https://joncohenmusic.github.io/bingo/verdict.mp3");
  snd.play().catch(() => {});
  // Reset Firestore after 3s
  setTimeout(() => {
    updateDoc(voteDoc, { fired: false, votes: {}, voters: [], defenders: [] }).catch(() => {});
  }, 3000);
  if (blastTimer) clearTimeout(blastTimer);
  blastTimer = setTimeout(dismissBlast, 10000);
}

function dismissBlast() {
  blasting = false;
  const blast = document.getElementById("verdict-blast");
  blast.className = "out";
  setTimeout(() => { blast.className = ""; }, 600);
}

function esc(str) {
  const d = document.createElement("div");
  d.textContent = str;
  return d.innerHTML;
}
</script>
</body>
</html>
