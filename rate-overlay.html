<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rate This Caller — Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --gold: #E8B84B;
  --gold-glow: rgba(232,184,75,0.55);
  --bg: rgba(14, 11, 4, 0.88);
  --text: #F2F2F2;
  --text-dim: rgba(242,242,242,0.55);
  --grid: rgba(255,255,255,0.06);
  --grid-strong: rgba(255,255,255,0.13);
  --tint-genuine: rgba(57,255,20,0.06);
  --tint-shifty:  rgba(255,160,30,0.07);
  --tint-sincere: rgba(108,155,255,0.06);
  --tint-troll:   rgba(255,45,85,0.07);
}

body {
  background: transparent;
  font-family: 'DM Sans', sans-serif;
  width: 1080px;
  height: 1920px;
  overflow: hidden;
  position: relative;
}

/* ── Card ─────────────────────────────────────────── */
#card {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) translateY(30px);
  width: 980px;
  background: var(--bg);
  backdrop-filter: blur(18px) saturate(1.4);
  -webkit-backdrop-filter: blur(18px) saturate(1.4);
  border: 1px solid rgba(232,184,75,0.45);
  border-radius: 22px;
  padding: 38px 40px 34px;
  opacity: 0;
  transition: opacity 0.45s ease, transform 0.45s cubic-bezier(0.22,1,0.36,1);
}
#card.visible {
  opacity: 1;
  transform: translate(-50%, -50%) translateY(0);
}
#card.hiding {
  opacity: 0;
  transform: translate(-50%, -50%) translateY(20px);
}

.card-accent-bar {
  position: absolute;
  top: 0; left: 40px; right: 40px;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  border-radius: 0 0 3px 3px;
}

/* ── Header ───────────────────────────────────────── */
.header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 22px;
  gap: 20px;
}

.title-block { display: flex; flex-direction: column; gap: 4px; }

.title-eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  letter-spacing: 3.5px;
  color: var(--text-dim);
  text-transform: uppercase;
}
.title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 38px;
  letter-spacing: 3px;
  color: var(--gold);
  line-height: 1;
}

.count-block {
  text-align: right;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.count-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 30px;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
  letter-spacing: 0.5px;
}
.count-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 2.5px;
  color: var(--text-dim);
  text-transform: uppercase;
}

/* ── Caller bar ───────────────────────────────────── */
.caller-bar {
  display: flex;
  align-items: center;
  gap: 14px;
  background: linear-gradient(180deg, rgba(0,0,0,0.32), rgba(0,0,0,0.18));
  border: 1px solid rgba(232,184,75,0.18);
  border-radius: 12px;
  padding: 14px 20px;
  margin-bottom: 24px;
}
.live-pip {
  width: 11px; height: 11px;
  border-radius: 50%;
  background: #ff2d55;
  flex-shrink: 0;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(255,45,85,0.6); }
  50% { opacity: 0.55; box-shadow: 0 0 0 9px rgba(255,45,85,0); }
}
.caller-bar-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  letter-spacing: 2.5px;
  color: var(--text-dim);
  text-transform: uppercase;
}
.caller-bar-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 30px;
  letter-spacing: 1.5px;
  color: var(--text);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── Plot ─────────────────────────────────────────── */
.plot-wrap {
  position: relative;
  width: 100%;
}
.plot {
  position: relative;
  width: 100%;
  aspect-ratio: 1 / 1;
  background:
    linear-gradient(135deg, var(--tint-shifty) 0%, transparent 50%, var(--tint-sincere) 100%),
    linear-gradient(45deg,  var(--tint-troll)  0%, transparent 50%, var(--tint-genuine)  100%),
    rgba(0,0,0,0.35);
  border: 1px solid rgba(232,184,75,0.22);
  border-radius: 16px;
  box-shadow:
    inset 0 0 80px rgba(0,0,0,0.5),
    0 12px 40px rgba(0,0,0,0.6);
  overflow: hidden;
}

/* Axes */
.plot::before, .plot::after {
  content: '';
  position: absolute;
  background: var(--grid-strong);
  pointer-events: none;
}
.plot::before {  /* horizontal */
  left: 6%; right: 6%;
  top: 50%; height: 1px;
}
.plot::after {   /* vertical */
  top: 6%; bottom: 6%;
  left: 50%; width: 1px;
}

/* Quarter grid marks (at ±5) */
.quarter-grid {
  position: absolute; inset: 0;
  pointer-events: none;
}
.quarter-grid::before, .quarter-grid::after {
  content: '';
  position: absolute;
  background: var(--grid);
}
.quarter-grid::before { /* horizontal at +5 and -5 */
  left: 6%; right: 6%; top: 25%; height: 1px;
  box-shadow: 0 50% 0 var(--grid);
}
.quarter-grid::after {  /* vertical at -5 and +5 */
  top: 6%; bottom: 6%; left: 25%; width: 1px;
  box-shadow: 50% 0 0 var(--grid);
}

/* Origin */
.origin-marker {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 9px; height: 9px;
  border: 1.5px solid var(--text-dim);
  border-radius: 50%;
  pointer-events: none;
}

/* Axis labels */
.axis-label {
  position: absolute;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  letter-spacing: 2.5px;
  color: var(--text-dim);
  text-transform: uppercase;
  pointer-events: none;
  z-index: 2;
}
.axis-substance-top { top: 14px; left: 50%; transform: translateX(-50%); }
.axis-substance-bot { bottom: 14px; left: 50%; transform: translateX(-50%); }
.axis-faith-left  { left: 14px;  top: 50%; transform: translateY(-50%) rotate(-90deg); transform-origin: left center; white-space: nowrap; }
.axis-faith-right { right: 14px; top: 50%; transform: translateY(-50%) rotate(90deg);  transform-origin: right center; white-space: nowrap; }

/* Quadrant labels */
.quadrant-label {
  position: absolute;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  letter-spacing: 4px;
  color: rgba(255,255,255,0.16);
  pointer-events: none;
  z-index: 1;
}
.q-genuine { top: 12%; right: 8%; }
.q-shifty  { top: 12%; left: 8%; }
.q-sincere { bottom: 12%; right: 8%; }
.q-troll   { bottom: 12%; left: 8%; }

/* Aggregate dot */
.agg-dot {
  position: absolute;
  width: 56px; height: 56px;
  margin: -28px 0 0 -28px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #ffffff, #f0f0f0 50%, #c8c8c8 100%);
  border: 3px solid var(--gold);
  box-shadow:
    0 0 0 2px rgba(255,255,255,0.3),
    0 0 28px rgba(255,255,255,0.45),
    0 0 60px var(--gold-glow),
    0 4px 14px rgba(0,0,0,0.5);
  z-index: 9;
  pointer-events: none;
  transition: left 0.55s cubic-bezier(0.22,1,0.36,1), top 0.55s cubic-bezier(0.22,1,0.36,1);
  will-change: left, top;
  opacity: 0;
}
.agg-dot.has-votes { opacity: 1; }

.agg-dot::before {
  content: '';
  position: absolute;
  inset: -14px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.25);
  animation: agg-pulse 2.4s ease-in-out infinite;
}
@keyframes agg-pulse {
  0%, 100% { transform: scale(1); opacity: 0.6; }
  50% { transform: scale(1.5); opacity: 0; }
}

/* No-votes hint */
.empty-hint {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, calc(-50% + 30px));
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  letter-spacing: 2.5px;
  color: var(--text-dim);
  text-transform: uppercase;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
  text-align: center;
  white-space: nowrap;
}
.empty-hint.show { opacity: 1; }

/* ── Footer / quadrant readout ────────────────────── */
.footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  margin-top: 22px;
  padding-top: 18px;
  border-top: 1px solid rgba(232,184,75,0.14);
}

.verdict-readout {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.verdict-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 2.5px;
  color: var(--text-dim);
  text-transform: uppercase;
}
.verdict-value {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px;
  letter-spacing: 2px;
  color: var(--gold);
  line-height: 1;
}

.cta {
  font-family: 'DM Sans', sans-serif;
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
  text-align: right;
  line-height: 1.25;
}
.cta strong {
  color: var(--gold);
  font-weight: 700;
}

/* ── Final-verdict lock state ─────────────────────── */
.final-overlay {
  position: absolute;
  inset: 0;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  background: radial-gradient(circle at center, rgba(232,184,75,0.18), transparent 60%);
  opacity: 0;
  transition: opacity 0.5s ease;
  z-index: 15;
}
.final-overlay.active { opacity: 1; }

.final-stamp {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 64px;
  letter-spacing: 8px;
  color: var(--gold);
  text-shadow:
    0 0 24px var(--gold-glow),
    0 0 48px rgba(232,184,75,0.4);
  border: 4px solid var(--gold);
  border-radius: 14px;
  padding: 18px 44px;
  background: rgba(20,15,5,0.78);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  transform: rotate(-7deg) scale(0.8);
  opacity: 0;
  transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease;
}
.final-overlay.active .final-stamp {
  transform: rotate(-7deg) scale(1);
  opacity: 1;
}

.locked .agg-dot {
  border-width: 5px;
  box-shadow:
    0 0 0 4px var(--gold),
    0 0 36px rgba(255,255,255,0.55),
    0 0 80px var(--gold-glow),
    0 6px 18px rgba(0,0,0,0.6);
}
.locked .agg-dot::before {
  animation: agg-pulse-fast 1.2s ease-in-out infinite;
}
@keyframes agg-pulse-fast {
  0%, 100% { transform: scale(1); opacity: 0.7; border-color: var(--gold); }
  50% { transform: scale(1.6); opacity: 0; }
}
</style>
</head>
<body>

<div id="card">
  <div class="card-accent-bar"></div>

  <div class="header">
    <div class="title-block">
      <div class="title-eyebrow">The Unconvinced</div>
      <div class="title">RATE THIS CALLER</div>
    </div>
    <div class="count-block">
      <div class="count-num" id="count-num">0</div>
      <div class="count-label">Voters</div>
    </div>
  </div>

  <div class="caller-bar">
    <div class="live-pip"></div>
    <div class="caller-bar-label">CALLER</div>
    <div class="caller-bar-name" id="caller-name">—</div>
  </div>

  <div class="plot-wrap">
    <div class="plot" id="plot">
      <div class="quarter-grid"></div>
      <div class="axis-label axis-substance-top">SUBSTANCE +</div>
      <div class="axis-label axis-substance-bot">SUBSTANCE −</div>
      <div class="axis-label axis-faith-left">GOOD FAITH −</div>
      <div class="axis-label axis-faith-right">GOOD FAITH +</div>
      <div class="quadrant-label q-genuine">GENUINE</div>
      <div class="quadrant-label q-shifty">SHIFTY</div>
      <div class="quadrant-label q-sincere">SINCERE</div>
      <div class="quadrant-label q-troll">TROLL</div>
      <div class="origin-marker"></div>
      <div class="empty-hint" id="empty-hint">Awaiting first vote…</div>
      <div class="agg-dot" id="agg-dot"></div>
      <div class="final-overlay" id="final-overlay">
        <div class="final-stamp">FINAL VERDICT</div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="verdict-readout">
      <div class="verdict-label">Crowd Verdict</div>
      <div class="verdict-value" id="verdict-value">—</div>
    </div>
    <div class="cta">
      Vote at <strong>joncohenmusic.github.io/bingo/rate.html</strong>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, collection }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCvclsCp83qcaTVTYe1GTT0ZIhIbMCut14",
  authDomain: "believer-bingo.firebaseapp.com",
  projectId: "believer-bingo",
  storageBucket: "believer-bingo.firebasestorage.app",
  messagingSenderId: "1054324566020",
  appId: "1:1054324566020:web:dc6739c69458011efe2d51"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const stateRef = doc(db, "rateThisCaller", "state");
const votesRef = collection(db, "rateThisCaller", "state", "votes");

const PLOT_PADDING_PCT = 6;
const AXIS_RANGE = 10;

let currentSessionId = null;
let isLocked = false;
let isVisible = false;

const card        = document.getElementById("card");
const callerName  = document.getElementById("caller-name");
const countNum    = document.getElementById("count-num");
const aggDot      = document.getElementById("agg-dot");
const emptyHint   = document.getElementById("empty-hint");
const finalOL     = document.getElementById("final-overlay");
const verdictVal  = document.getElementById("verdict-value");
const plot        = document.getElementById("plot");

function axisToPctX(x) {
  const half = (50 - PLOT_PADDING_PCT);
  return 50 + (x / AXIS_RANGE) * half;
}
function axisToPctY(y) {
  const half = (50 - PLOT_PADDING_PCT);
  return 50 - (y / AXIS_RANGE) * half;
}

function quadrantLabel(x, y) {
  // x = goodFaith axis, y = substance axis
  const NEAR = 1.0; // dead zone around origin
  if (Math.abs(x) < NEAR && Math.abs(y) < NEAR) return "UNDECIDED";
  if (y >= 0 && x >= 0) return "GENUINE";
  if (y >= 0 && x <  0) return "SHIFTY";
  if (y <  0 && x >= 0) return "SINCERE";
  return "TROLL";
}

function showCard() {
  if (isVisible) return;
  isVisible = true;
  card.classList.remove("hiding");
  void card.offsetWidth;
  card.classList.add("visible");
}
function hideCard() {
  if (!isVisible) return;
  isVisible = false;
  card.classList.remove("visible");
  card.classList.add("hiding");
}

// ── State subscription ────────────────────────────────
onSnapshot(stateRef, snap => {
  if (!snap.exists()) { hideCard(); return; }
  const d = snap.data();
  const visible = d.visible !== false;
  const sessionId = d.sessionId || null;
  const caller = d.callerName || "—";
  const locked = !!d.locked;

  callerName.textContent = caller;
  currentSessionId = sessionId;

  // Lock state
  isLocked = locked;
  finalOL.classList.toggle("active", isLocked);
  plot.classList.toggle("locked", isLocked);

  if (visible && sessionId) showCard();
  else hideCard();
});

// ── Aggregate ─────────────────────────────────────────
onSnapshot(votesRef, snap => {
  if (!currentSessionId) {
    countNum.textContent = "0";
    aggDot.classList.remove("has-votes");
    emptyHint.classList.remove("show");
    verdictVal.textContent = "—";
    return;
  }
  let sx = 0, sy = 0, n = 0;
  snap.forEach(d => {
    const v = d.data();
    if (v.sessionId !== currentSessionId) return;
    if (typeof v.substance !== "number" || typeof v.goodFaith !== "number") return;
    sx += v.goodFaith;
    sy += v.substance;
    n++;
  });
  countNum.textContent = String(n);

  if (n === 0) {
    aggDot.classList.remove("has-votes");
    emptyHint.classList.add("show");
    verdictVal.textContent = "—";
    return;
  }

  emptyHint.classList.remove("show");
  const ax = sx / n, ay = sy / n;
  aggDot.style.left = axisToPctX(ax) + "%";
  aggDot.style.top  = axisToPctY(ay) + "%";
  aggDot.classList.add("has-votes");
  verdictVal.textContent = quadrantLabel(ax, ay);
});
</script>
</body>
</html>
